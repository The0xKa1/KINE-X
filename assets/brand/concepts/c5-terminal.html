<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: "JetBrains Mono"; src: url("../../../public/fonts/jetbrains-mono.woff2") format("woff2"); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #f7f1e5; }
  .board {
    position: relative; width: 1200px; height: 1200px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }

  /* ===== C5 · TERMINAL: the X is drawn by the log itself — slashes in a mono grid ===== */
  .grid {
    font-family: "JetBrains Mono", monospace;
    font-size: 54px; line-height: 1.18; letter-spacing: 14px;
    color: #111111; white-space: pre; user-select: none;
  }
  .grid b { color: #ff4d00; font-weight: 400; }
  .cursor {
    display: inline-block; width: 34px; height: 56px;
    background: #ff4d00; vertical-align: -6px;
  }
</style>
</head>
<body>
<div class="board">
  <div class="grid" id="g"></div>
</div>
<script>
  // build an X out of "/" and "\" in a mono grid; a few slashes glitch hot
  const N = 15, rows = [];
  const hotCells = new Set(["2,3", "5,10", "7,7", "9,4", "12,11", "3,11"]);
  for (let r = 0; r < N; r++) {
    let line = "";
    for (let col = 0; col < N; col++) {
      let ch = " ";
      if (col === r) ch = "\\";
      if (col === N - 1 - r) ch = "/";
      if (col === r && col === N - 1 - r) ch = "X";
      if (ch !== " " && hotCells.has(r + "," + col)) ch = "<b>" + ch + "</b>";
      line += ch;
    }
    rows.push(line);
  }
  document.getElementById("g").innerHTML =
    rows.join("\n") + '\n<span class="cursor"></span>';
</script>
</body>
</html>
